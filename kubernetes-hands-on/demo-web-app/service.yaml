apiVersion: v1
kind: Service
metadata:
  name: demo-web-service
spec:
  type: NodePort # ClusterIP(default) - for internal use | NodePort | LoadBalancer
  selector:
    app: demo-web-app
  ports:
    - protocol: TCP
      targetPort: 80
      port: 80
      nodePort: 30080 # This is only needed for type: NodePort
